<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Biodiversidad</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles.css">
      <link rel="icon" href="../multimedia/logoverde.png" alt="Icono de Reciclaje">
</head>
<body>
    <div class="theme-toggle">
        <button id="darkModeToggle" class="btn-outline-dark">
            <i class="bi bi-moon"></i>
        </button>
    </div>

    <div class="form-card">
        <div class="logo-container">
            <div class="logo">
                <i class="bi bi-flower1"></i>
            </div>
            <h1>Biodiversidad</h1>
            <p class="subtitle">Inicia sesión para acceder al sistema</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <div style="position: relative;">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="username" class="form-control input-with-icon" placeholder="Ingresa tu usuario" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div style="position: relative;">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="password" class="form-control input-with-icon" placeholder="Ingresa tu contraseña" required>
                    <button type="button" class="toggle-pass" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary">Iniciar Sesión</button>

            <div class="form-footer">
                <p>¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
                <p><a href="#">¿Olvidaste tu contraseña?</a></p>
            </div>
        </form>
    </div>

    <script src="../scripts/index.js"></script>
</body>
</html>
