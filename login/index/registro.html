<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Biodiversidad</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../estilos/registrilos.css">
      <link rel="icon" href="../multimedia/logoverde.png" alt="Icono de Reciclaje">
</head>
<body>
    <div class="theme-toggle">
        <button id="darkModeToggle" class="btn-outline-dark">
            <i class="bi bi-moon"></i>
        </button>
    </div>

    <div class="form-card">
        <div class="logo-container">
            <div class="logo">
                <i class="bi bi-flower1"></i>
            </div>
            <h1>Únete a Biodiversidad</h1>
            <p class="subtitle">Crea tu cuenta para acceder a todos los recursos</p>
        </div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Nombre</label>
                    <div style="position: relative;">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" id="firstName" name="firstName" class="form-control input-with-icon" placeholder="Tu nombre" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="lastName">Apellido</label>
                    <div style="position: relative;">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" id="lastName" name="lastName" class="form-control input-with-icon" placeholder="Tu apellido" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div style="position: relative;">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" id="email" name="email" class="form-control input-with-icon" placeholder="tu.correo@ejemplo.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <div style="position: relative;">
                    <i class="bi bi-at input-icon"></i>
                    <input type="text" id="username" name="username" class="form-control input-with-icon" placeholder="Elige un nombre de usuario" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div style="position: relative;">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-control input-with-icon" placeholder="Crea una contraseña segura" required>
                    <button type="button" class="toggle-pass" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <small style="color: #64748b; font-size: 0.8rem; display: block; margin-top: 0.3rem;">
                    La contraseña debe tener al menos 8 caracteres, incluyendo mayúsculas, minúsculas y números.
                </small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <div style="position: relative;">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control input-with-icon" placeholder="Repite tu contraseña" required>
                    <button type="button" class="toggle-pass" id="toggleConfirmPassword">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="terms">
              <input type="checkbox" id="terms" name="terms" required>
              <label for="terms">Acepto los <a href="#">términos y condiciones</a> y la <a href="#">política de privacidad</a> de Biodiversidad</label>
            </div>

            <button type="submit" class="btn-primary">Crear Cuenta</button>

            <div class="form-footer">
                <p>¿Ya tienes una cuenta? <a href="../index/login.html">Inicia sesión aquí</a></p>
            </div>
        </form>
    </div>

    <script src="../scripts/registro.js"></script>
</body>
</html>
